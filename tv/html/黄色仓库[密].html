function _fm(timeout){
  return new Promise(function(resolve){
    if(window.fm) return resolve(window.fm);
    var n=0,max=Math.ceil((timeout||1800)/100);
    (function wait(){
      if(window.fm) return resolve(window.fm);
      if(++n>max) return resolve(null);
      setTimeout(wait,100);
    })();
  });
}

function fixUrl(u){
  u=String(u||'').trim();
  if(!u) return '';
  if(u.indexOf('//')===0) return 'http:'+u;
  if(u.indexOf('/')===0) return SITE+u;
  if(!/^https?:\/\//i.test(u)) return SITE+'/'+u;
  return u;
}

function _img(u){
  u=fixUrl(u);
  try{ if(window.fm && fm.res) return fm.res(u,{headers:{Referer:SITE+'/'}}); }catch(e){}
  return u;
}

function _req(url, referer){
  url=fixUrl(url);
  referer = referer || (SITE + '/');
  return _fm(1800).then(function(f){
    if(f && f.req){
      return f.req(url,{method:'GET',headers:{'User-Agent':UA,'Referer':referer},responseType:'text',timeout:30,credentials:'include'}).then(function(r){
        if(!r || !r.ok) throw new Error((r&&r.error)||('HTTP '+(r&&r.status||500)));
        return r.body||'';
      });
    }
    return fetch(url,{headers:{'User-Agent':UA,'Referer':referer}}).then(function(r){return r.text();});
  });
}

function parseRealHome(html){
  var doc = new DOMParser().parseFromString(html,'text/html');
  var nodes = doc.querySelectorAll('a.stui-vodlist__thumb[href]');
  var arr=[];
  for(var i=0;i<nodes.length;i++){
    var a=nodes[i];
    var title=a.getAttribute('title')||'';
    var playUrl=fixUrl(a.getAttribute('href')||'');
    var img=a.getAttribute('data-original')||a.getAttribute('data-src')||a.getAttribute('src')||'';
    var durEl=a.querySelector('.pic-text');
    var duration=durEl?durEl.textContent.trim():'';
    var box=a.closest('.stui-vodlist__box');
    var remark='点击查看详情';
    if(box){
      var sub=box.querySelector('.sub');
      if(sub) remark=sub.textContent.replace(/\s+/g,' ').trim();
    }
    if(title && playUrl){ arr.push({title:title,remark:remark,duration:duration,img:fixUrl(img),playUrl:playUrl,epCount:1}); }
  }
  return arr;
}

function makePoster(canvasEl, title) {
  canvasEl.width = 300;
  canvasEl.height = 400;
  var ctx = canvasEl.getContext('2d');
  var hash = 0;
  for (var i = 0; i < title.length; i++) hash = ((hash << 5) - hash) + title.charCodeAt(i);
  var seed = Math.abs(hash) % 6;
  var palette = [
    ['#ff6b35','#ff3d00'], ['#ff6b35','#ffb86b'], ['#5c7cff','#3d5aff'],
    ['#68e39a','#25b86b'], ['#ffb86b','#ff6b35'], ['#ff5c7a','#ff3d5a']
  ];
  var colors = palette[seed];
  var grad = ctx.createLinearGradient(0, 0, 300, 400);
  grad.addColorStop(0, colors[0]);
  grad.addColorStop(1, colors[1]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 300, 400);
  var short = title.length > 12 ? title.substring(0, 10) + '…' : title;
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.font = '13px sans-serif';
  ctx.fillText(short, 150, 165);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '11px sans-serif';
  ctx.fillText('蓝魔仓库', 150, 190);
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.font = '60px sans-serif';
  ctx.fillText('▶', 150, 310);
  return canvasEl.toDataURL('image/jpeg', 0.85);
}

    btn.dataset.cat = name;
    btn.textContent = name;
    btn.addEventListener('click', function(){loadCat(this.dataset.cat);});
    tabs.appendChild(btn);
  }
}

function makeCard(item, posterCanvas) {
  var card = document.createElement('article');
  card.className = 'card focusable';
  card.tabIndex = 0;
  card.dataset.title = item.title;
  var poster = document.createElement('div');
  poster.className = 'poster';
  var img = document.createElement('img');
  img.loading = 'lazy';
  img.src = item.img ? _img(item.img) : makePoster(posterCanvas, item.title);
  img.alt = item.title;
  img.onerror = function(){
    try{ this.src = makePoster(posterCanvas, item.title || '蓝魔仓库'); }catch(e){ this.style.display='none'; }
  };
  poster.appendChild(img);
  if (item.duration) {
    var dur = document.createElement('span');
    dur.className = 'video-duration';
    dur.textContent = item.duration;
    poster.appendChild(dur);
  }
  card.appendChild(poster);
  var meta = document.createElement('div');
  meta.className = 'meta';
  var nameEl = document.createElement('div');
  nameEl.className = 'name';
  nameEl.textContent = item.title;
  meta.appendChild(nameEl);
  var remarkEl = document.createElement('div');
  remarkEl.className = 'remark';
  remarkEl.textContent = item.remark || '点击查看详情';
  meta.appendChild(remarkEl);
  card.appendChild(meta);
  card.addEventListener('click', function(){openDetailByTitle(this.dataset.title);});
  card.addEventListener('keydown', function(e){if(e.key==='Enter')this.click();});
  return card;
}

function loadCat(catName){
  currentCat = catName;
  renderTabs(catName);
  content.innerHTML = '<div class="empty loading">正在加载「' + catName + '」...</div>';
  var url = CAT_URLS[catName] || '/';
  _req(url).then(function(html){
    var real = parseRealHome(html);
    if(real.length){ VIDEO_DATA[catName] = real; }
    renderCatItems(catName, VIDEO_DATA[catName] || []);
  }).catch(function(e){
    renderCatItems(catName, VIDEO_DATA[catName] || []);
    status.textContent = '真实分类加载失败，已显示备用数据：' + (e.message || e);
  });
}

function renderCatItems(catName, allItems){
  if (allItems.length === 0) {
    content.innerHTML = '<div class="empty">暂无内容</div>';
    status.textContent = '该分类暂无内容';
    return;
  }
  content.innerHTML = '';
  var sec = document.createElement('section');
  sec.className = 'section';
  var head = document.createElement('div');
  head.className = 'section-title';
  var h2 = document.createElement('h2');
  h2.textContent = catName;
  head.appendChild(h2);
  sec.appendChild(head);
  var grid = document.createElement('div');
  grid.className = 'grid';
  var posterCanvas = document.createElement('canvas');
  for (var i = 0; i < allItems.length; i++) grid.appendChild(makeCard(allItems[i], posterCanvas));
  sec.appendChild(grid);
  content.appendChild(sec);
  status.textContent = '已加载「' + catName + '」共' + allItems.length + '条';
}

function openDetailByTitle(title){
  lastFocus = document.activeElement;
  document.body.classList.add('detail-active');
  $('#detailSheet').classList.add('active');
  history.pushState({detailOpen: true}, '', '#detail');
  
  var videoItem = null;
  
  // 1. 先在普通分类中查找
  for (var i = 0; i < CATS.length; i++) {
    var items = VIDEO_DATA[CATS[i]];
    for (var j = 0; j < items.length; j++) {
      if (items[j].title === title) { videoItem = items[j]; break; }
    }
    if (videoItem) break;
  }
  
  // 2. ✅ 如果没找到，去搜索结果中查找（这是新增的）
  if (!videoItem) {
    var searchItems = VIDEO_DATA['搜索结果'];
    if (searchItems) {
      for (var k = 0; k < searchItems.length; k++) {
        if (searchItems[k].title === title) {
          videoItem = searchItems[k];
          break;
        }
      }
    }
  }
  
  if (!videoItem) {
    document.getElementById('detailPanel').innerHTML = '<button class="focusable" onclick="closeDetail()">返回</button><div class="empty">内容未找到</div>';
    return;
  }
  
  var epCount = videoItem.playUrl ? 1 : (videoItem.epCount || 0);
  var posterCanvas = document.createElement('canvas');
  var detailPic = videoItem.img ? _img(videoItem.img) : makePoster(posterCanvas, title);
  
  var panel = document.getElementById('detailPanel');
  var html = '';
  html += '<button class="focusable" id="closeDetail">返回</button>';
  html += '<div class="detail-head">';
  html += '<img class="detail-pic" referrerpolicy="no-referrer" src="' + detailPic + '" onerror="this.style.display=\'none\'">';
  html += '<div class="detail-side">';
  html += '<div class="detail-title">' + title + '</div>';
  html += '<div class="detail-info">';
  if (videoItem.remark) html += '<div><b>备注：</b>' + videoItem.remark + '</div>';
  if (videoItem.duration) html += '<div><b>时长：</b>' + videoItem.duration + '</div>';
  html += '</div></div></div>';
  html += '<div class="intro-pill">简介</div>';
  html += '<p class="desc">这是一部精彩的视频内容，画面清晰，剧情紧凑，演员表演出色，不容错过。</p>';
  html += '<div class="play-title">播放线路</div>';
  html += '<div class="line-tabs"><button class="line-tab focusable active" data-sid="1">默认线路</button></div>';
  html += '<div class="episodes" id="episodeBox">';
  if (epCount > 1) {
    for (var k = 1; k <= epCount; k++) {
      html += '<button class="ep focusable" data-action="ep" data-title="' + k + '">第' + k + '集</button>';
    }
  } else {
    html += '<button class="ep focusable" data-action="play" data-title="' + escAttr(title) + '" style="grid-column:1/-1;text-align:center;font-size:18px;padding:16px;background:linear-gradient(135deg,rgba(255,107,53,.7),rgba(255,184,107,.5));border-color:rgba(255,184,107,.6);">▶ 立即播放</button>';
  }
  html += '</div>';
  panel.innerHTML = html;
  
  $('#closeDetail').onclick = closeDetail;
  document.getElementById('episodeBox').querySelectorAll('.ep').forEach(function(btn) {
    btn.onclick = function() {
      var action = this.getAttribute('data-action');
      if (action === 'play') {
        playSingle(this.getAttribute('data-title'));
      } else {
        playEpisode(this.getAttribute('data-title'), title);
      }
    };
  });
  $('#closeDetail').focus({preventScroll:true});
}

function escAttr(s){
  return String(s||'').split('"').join('&#34;').replace(/'/g,'&#39;');
}

function playSingle(title){
  var url = getPlayUrl(title, 1);
  doPlay(url, title);
}

function playEpisode(epNum, title){
  var url = getPlayUrl(title, epNum);
  doPlay(url, title + ' 第' + epNum + '集');
}

function findItemByTitle(title){
  // 合并所有数据源
  var allItems = [];
  for(var c=0;c<CATS.length;c++){
    var arr=VIDEO_DATA[CATS[c]]||[];
    for(var i=0;i<arr.length;i++){ allItems.push(arr[i]); }
  }
  // 加上搜索结果
  var searchResults = VIDEO_DATA['搜索结果'] || [];
  for(var j=0;j<searchResults.length;j++){ allItems.push(searchResults[j]); }
  
  // 查找匹配的标题
  for(var k=0;k<allItems.length;k++){
    if(allItems[k].title === title) return allItems[k];
  }
  return null;
}

function getPlayUrl(title, epNum){
  var item=findItemByTitle(title);
  if(item && item.playUrl){ return item.playUrl; }
  var BASE = SITE;
  var map = [
    ['老婆骚逼被单男内射满5次还想要','/vodplay/200383-1-1.html'],
    ['今天约了一个高颜值的小妹妹','/vodplay/200357-1-1.html'],
    ['偷拍女儿洗澡','/vodplay/200359-1-1.html'],
    ['我的双面宝贝','/vodplay/199174-1-1.html']
  ];
  for(var i=0;i<map.length;i++){
    if(title.indexOf(map[i][0]) >= 0){
      var path = map[i][1];
      if(epNum && epNum > 1){ path = path.replace(/-1-1\.html$/, '-1-' + epNum + '.html'); }
      return BASE + path;
    }
  }
  return BASE + '/vodsearch/-------------.html?wd=' + encodeURIComponent(title.replace(/^骑兵破解/, '').slice(0,40));
}

function extractIframeSrc(html){
  var m = html.match(/<iframe[^>]+src=["']([^"']+)["']/i);
  return m ? fixUrl(m[1]) : '';
}

function extractDirectVideoUrl(text){
  if(!text) return '';
  var m;
  m = text.match(/var\s+player_aaaa\s*=\s*(\{[\s\S]*?\})\s*<\/script>/i);
  if(m){
    try{
      var obj = JSON.parse(m[1].replace(/\\\//g,'/'));
      if(obj && obj.url){
        var u = obj.url;
        if(/\.(m3u8|mp4|mkv)(\?|$)/i.test(u)) return u;
        return u;
      }
    }catch(e){}
  }
  m = text.match(/(?:art\.url|mysvg|video_url|url)\s*=\s*["']([^"']+\.(?:m3u8|mp4|mkv)[^"']*)["']/i);
  if(m) return m[1];
  m = text.match(/loadSource\s*\(\s*["']([^"']+\.m3u8[^"']*)["']/i);
  if(m) return m[1];
  m = text.match(/[?&]url=([^&"'\s]+(?:\.m3u8|\.mp4|\.mkv)[^&"'\s]*)/i);
  if(m){ try{return decodeURIComponent(m[1]);}catch(e){return m[1];} }
  m = text.match(/(https?:\/\/[^\s"'<>\\]+\.(?:m3u8|mp4|mkv)(?:\?[^\s"'<>\\]*)?)/i);
  if(m) return m[1];
  return '';
}

async function doPlay(playPageUrl, title){
  playPageUrl = fixUrl(playPageUrl);
  status.textContent = '正在解析播放源：' + title;
  try{
    var f = await _fm(2000);
    var playHtml = await _req(playPageUrl);
    var videoUrl = '';
    var idm = playHtml.match(/var\s+VID\s*=\s*(\d+)\s*,\s*SID\s*=\s*(\d+)\s*,\s*NID\s*=\s*(\d+)/i);
    if(idm){
      try{
        var dataText = await _req('/playdata.php?id=' + idm[1] + '&sid=' + idm[2] + '&nid=' + idm[3] + '&_=' + Date.now(), playPageUrl);
        var data = JSON.parse(dataText);
        if(data && data.ok && data.p && data.p.url){ videoUrl = data.p.url; }
      }catch(e){}
    }
    if(!videoUrl) videoUrl = extractDirectVideoUrl(playHtml);
    var iframeUrl = extractIframeSrc(playHtml);
    if(!videoUrl && iframeUrl){
      videoUrl = extractDirectVideoUrl(iframeUrl);
      if(!videoUrl){
        try{
          var iframeHtml = await _req(iframeUrl);
          videoUrl = extractDirectVideoUrl(iframeHtml);
        }catch(e){}
      }
    }
    if(f && f.play){
      if(videoUrl){
        status.textContent = '解析成功，正在播放：' + title;
        try{
          await f.play(videoUrl, title || '');
          return;
        }catch(e){
          await f.play('push://' + playPageUrl, title || '');
          return;
        }
      }
      status.textContent = '直链未解析，启动嗅探：' + title;
      await f.play('push://' + (iframeUrl || playPageUrl), title || '');
      return;
    }
    location.href = videoUrl || iframeUrl || playPageUrl;
  }catch(e){
    status.textContent = '播放解析失败，尝试打开原站：' + title;
    location.href = playPageUrl;
  }
}

function closeDetail(){
  document.body.classList.remove('detail-active');
  $('#detailSheet').classList.remove('active');
  if (lastFocus && lastFocus.focus) setTimeout(function(){lastFocus.focus({preventScroll:true});}, 50);
  // 关键修复：返回后替换历史记录，避免再次后退退出
  history.replaceState(null, '', location.pathname + location.search);
}

function doSearch(q){
  q = q.replace(/\s+/g,' ').trim();
  if (!q) return;
  status.textContent = '搜索：' + q;
  content.innerHTML = '<div class="empty loading">搜索中...</div>';
  var url = '/vodsearch/-------------.html?wd=' + encodeURIComponent(q);
  _req(url).then(function(html){
    var results = parseRealHome(html);
    if(!results.length){
      content.innerHTML = '<div class="empty">没有找到相关结果</div>';
      status.textContent = '无搜索结果：' + q;
      return;
    }
    VIDEO_DATA['搜索结果'] = results;
    renderCatItems('搜索：' + q, results);
    status.textContent = '搜索完成：' + q + '，找到 ' + results.length + ' 条';
  }).catch(function(e){
    content.innerHTML = '<div class="empty">搜索失败：' + (e.message || e) + '</div>';
  });
}

$('#searchForm').onsubmit = function(e){
  e.preventDefault();
  var q = $('#kw').value.trim();
  if (q) doSearch(q);
};

// ========== 关键修复：键盘事件 ==========
document.addEventListener('keydown', function(e){
  if (e.key === 'Escape' || e.key === 'Backspace') {
    if ($('#detailSheet').classList.contains('active')) { 
      e.preventDefault(); 
      closeDetail(); 
      return;
    }
  }
  if (e.key === 'Enter' && document.activeElement && document.activeElement.classList && document.activeElement.classList.contains('focusable') && document.activeElement.tagName !== 'INPUT') {
    document.activeElement.click();
  }
});

// ========== 关键修复：popstate 事件拦截手势返回 ==========
window.addEventListener('popstate', function(e) {
  if ($('#detailSheet').classList.contains('active')) {
    // 详情页打开时，拦截返回手势，先关闭详情页
    e.preventDefault();
    closeDetail();
    // 重新添加一个历史记录，防止页面后退
    history.pushState(null, '', location.pathname + location.search);
  }
});

// ========== 关键修复：初始化时添加历史记录占位 ==========
// 防止一打开APP就后退退出
history.replaceState(null, '', location.pathname + location.search);
history.pushState(null, '', location.pathname + location.search);

renderTabs('首页');
loadRealHome();

})();
</script>
