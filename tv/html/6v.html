<script>
(function(){
'use strict';

const BASE = 'https://www.xb6v.org';
const CATS = [
  ['首页', '/'],
  ['喜剧片', '/xijupian/'],
  ['动作片', '/dongzuopian/'],
  ['爱情片', '/aiqingpian/'],

  ['动画片', '/donghuapian/'],
  ['电视剧', '/dianshiju/'],
  ['综艺', '/ZongYi/']
];
const UA = 'Mozilla/5.0 (Linux; Android 13) AppleWebKit/537.36 Chrome/120 Mobile Safari/537.36';

let fmReady = false;
let currentUrl = BASE + '/';
let lastFocus = null;
let lastSearchKeyword = '';

const $ = s => document.querySelector(s);
const content = $('#content');
const statusEl = $('#status');
const tabsDiv = $('#tabs');

function detectTV() {
  var el = document.documentElement;
  if (window.fongmiClient && window.fongmiClient.isLeanback) {
    el.classList.add('tv-mode');
    return;
  }
  var fm = window.fm || window.fongmi;
  if (fm && fm.device) {
    fm.device().then(function(dev) {
      if (dev && (Number(dev.type) === 0 || String(dev.mode).toLowerCase() === 'leanback')) {
        el.classList.add('tv-mode');
      }
    }).catch(function(){});
  }
}
function markNative() {
  if (window.fongmiBridge || window.fm || window.fongmi) 
    document.documentElement.classList.add('fm-native');
}
function waitFm(ms) {
  if (ms === undefined) ms = 1600;
  markNative();
  if (window.fm) {
    fmReady = true;
    return Promise.resolve(window.fm);
  }
  return new Promise(function(resolve) {
    var done = false;
    var ok = function() {
      if (done) return;
      done = true;
      markNative();
      fmReady = !!window.fm;
      resolve(window.fm || null);
    };
    window.addEventListener('fmsdk', ok, { once: true });
    setTimeout(ok, ms);
  });
}

function abs(url) {
  if (!url) return '';
  try { return new URL(url, BASE + '/').href; } catch(e) { return url; }
}
function esc(s) {
  if (!s) return '';
  return String(s).replace(/[&<>'"]/g, function(c) {
    if (c === '&') return '&amp;';
    if (c === '<') return '&lt;';
    if (c === '>') return '&gt;';
    if (c === "'") return '&#39;';
    if (c === '"') return '&quot;';
    return c;
  });
}
function clean(s) {
  return String(s || '').replace(/\s+/g, ' ').replace(/[\uE000-\uF8FF]/g, '').trim();
}
function imgUrl(u) {
  u = abs(u);
  if (!u) return '';
  try {
    if (window.fm && fm.res) return fm.res(u, { headers: { Referer: BASE + '/' } });
  } catch(e) {}
  return u;
}

// 增强版请求：自动检测编码（GBK/UTF-8）
async function reqText(url, options) {
  if (!options) options = {};
  url = abs(url);
  statusEl.textContent = '加载：' + url;
  var headers = Object.assign({
    'User-Agent': UA,
    'Referer': BASE + '/',
    'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
    'Accept-Language': 'zh-CN,zh;q=0.9'
  }, options.headers || {});
  var lastErr;
  
  async function fetchWithAutoDecode() {
    if (window.fm && fm.req) {
      try {
        var resp = await fm.req(url, {
          method: options.method || 'GET',
          headers: headers,
          responseType: 'arraybuffer',
          timeout: options.timeout || 25,
          credentials: 'include',
          body: options.body
        });
        if (resp && (resp.ok || resp.status === 200)) {
          var buf = resp.body || resp.data;
          if (buf) return buf;
        }
      } catch(e) { lastErr = e; }
    }
    try {
      var r = await fetch(url, {
        method: options.method || 'GET',
        headers: headers,
        cache: 'no-store',
        credentials: 'include'
      });
      if (r.ok) {
        return await r.arrayBuffer();
      }
    } catch(e) { lastErr = e; }
    return null;
  }
  
  // 优先获取文本（快速）
  try {
    if (window.fm && fm.req) {
      var respText = await fm.req(url, {
        method: options.method || 'GET',
        headers: headers,
        responseType: 'text',
        timeout: options.timeout || 25,
        credentials: 'include',
        body: options.body
      });
      if (respText && (respText.ok || respText.status === 200)) {
        var txt = respText.body || respText.content || respText.data || respText.text || '';
        if (txt && !txt.includes('锟斤拷') && !txt.includes('�')) return txt;
      }
      if (String(respText && respText.status) === '520') {
        var retryHeaders = Object.assign({}, headers, { Referer: 'https://www.baidu.com/', Accept: 'text/html,*/*' });
        var retryUrl = url + (url.indexOf('?') >= 0 ? '&' : '?') + '_t=' + Date.now();
        var retryResp = await fm.req(retryUrl, {
          method: options.method || 'GET',
          headers: retryHeaders,
          responseType: 'text',
          timeout: 30,
          credentials: 'include',
          body: options.body
        });
        if (retryResp && (retryResp.ok || retryResp.status === 200)) {
          var txt2 = retryResp.body || retryResp.content || retryResp.data || '';
          if (txt2 && !txt2.includes('锟斤拷')) return txt2;
        }
      }
    }
  } catch(e) { lastErr = e; }
  
  // 自动解码
  var buffer = await fetchWithAutoDecode();
  if (buffer) {
    var uint8 = new Uint8Array(buffer);
    var tempDecoder = new TextDecoder('utf-8');
    var headPart = tempDecoder.decode(uint8.slice(0, Math.min(8192, uint8.length)));
    var charsetMatch = headPart.match(/<meta[^>]+charset\s*=\s*["']?([a-zA-Z0-9\-]+)["']?/i);
    var encoding = 'utf-8';
    if (charsetMatch && (charsetMatch[1].toLowerCase() === 'gbk' || charsetMatch[1].toLowerCase() === 'gb2312')) {
      encoding = 'gbk';
    } else if (headPart.includes('锟斤拷') || headPart.includes('�')) {
      encoding = 'gbk';
    }
    try {
      var decoder = new TextDecoder(encoding);
      var result = decoder.decode(uint8);
      if (encoding === 'utf-8' && (result.includes('锟斤拷') || result.includes('�'))) {
        decoder = new TextDecoder('gbk');
        result = decoder.decode(uint8);
      }
      return result;
    } catch(e) { lastErr = e; }
  }
  
  try {
    var r2 = await fetch(url, { headers: headers, cache: 'no-store', credentials: 'include' });
    if (r2.ok) {
      return await r2.text();
    }
  } catch(e) { lastErr = e; }
  
  statusEl.textContent = '加载失败';
  throw lastErr || new Error('HTTP 请求全部失败');
}

// 核心：根据URL规律推断下一页和上一页（不依赖HTML）
function inferPaginationFromUrl(url) {
  let next = null;
  let prev = null;
  
  let matchIndex = url.match(/(\/[^?]*\/)index_(\d+)\.html/);
  if (matchIndex) {
    let base = matchIndex[1];
    let pageNum = parseInt(matchIndex[2], 10);
    if (!isNaN(pageNum)) {
      next = base + 'index_' + (pageNum + 1) + '.html';
      if (pageNum > 2) prev = base + 'index_' + (pageNum - 1) + '.html';
      else if (pageNum === 2) prev = base;
      return { next, prev };
    }
  }
  
  let categoryMatch = url.match(/^(.+\/)(?:index\.html)?$/);
  if (categoryMatch && !url.includes('index_') && !url.includes('?page=')) {
    let base = categoryMatch[1];
    next = base + 'index_2.html';
    prev = null;
    return { next, prev };
  }
  
  let pageParamMatch = url.match(/[?&]page=(\d+)/);
  if (pageParamMatch) {
    let pageNum = parseInt(pageParamMatch[1], 10);
    let newUrl = url.replace(/([?&])page=\d+/, (match, prefix) => {
      return prefix + 'page=' + (pageNum + 1);
    });
    next = newUrl;
    if (pageNum > 2) {
      let prevUrl = url.replace(/([?&])page=\d+/, (match, prefix) => {
        return prefix + 'page=' + (pageNum - 1);
      });
      prev = prevUrl;
    } else if (pageNum === 2) {
      prev = url.replace(/[?&]page=2/, '').replace(/[?&]$/, '').replace(/\?$/, '');
      if (prev.endsWith('?')) prev = prev.slice(0, -1);
    }
    return { next, prev };
  }
  
  let slashPageMatch = url.match(/\/page\/(\d+)(?:\/|$)/);
  if (slashPageMatch) {
    let pageNum = parseInt(slashPageMatch[1], 10);
    let base = url.replace(/\/page\/\d+.*$/, '');
    next = base + '/page/' + (pageNum + 1);
    if (pageNum > 2) prev = base + '/page/' + (pageNum - 1);
    else if (pageNum === 2) prev = base + '/';
    return { next, prev };
  }
  
  return { next: null, prev: null };
}

function parsePaginationFromHtml(html, currentUrl) {
  let nextUrl = null;
  let prevUrl = null;
  
  const nextTextMatch = html.match(/<a[^>]+href\s*=\s*["']([^"']+)["'][^>]*>(?:[^<]|<[^>]+>)*下一页(?:[^<]|<[^>]+>)*<\/a>/i);
  if (nextTextMatch) nextUrl = nextTextMatch[1];
  
  if (!nextUrl) {
    const pageArea = html.match(/<(?:div|ul)[^>]*class\s*=\s*["'][^"']*(?:pages|pagination|page-links)[^"']*["'][^>]*>([\s\S]*?)<\/(?:div|ul)>/i);
    if (pageArea) {
      const areaHtml = pageArea[1];
      const linkRegex = /<a[^>]+href\s*=\s*["']([^"']+)["'][^>]*>([^<]+)<\/a>/gi;
      let match;
      let links = [];
      while ((match = linkRegex.exec(areaHtml)) !== null) {
        links.push({ href: match[1], text: match[2].trim() });
      }
      for (let ln of links) {
        if (ln.text === '下一页' || ln.text === '下页' || ln.text === '›' || ln.text === '»' || ln.text.toLowerCase() === 'next') {
          nextUrl = ln.href;
          break;
        }
      }
      if (!nextUrl && links.length > 0) {
        let lastLink = links[links.length-1];
        if (lastLink.text !== '上一页' && lastLink.text !== '‹' && lastLink.text !== '«' && lastLink.text.toLowerCase() !== 'prev') {
          nextUrl = lastLink.href;
        }
      }
    }
  }
  
  const prevTextMatch = html.match(/<a[^>]+href\s*=\s*["']([^"']+)["'][^>]*>(?:[^<]|<[^>]+>)*上一页(?:[^<]|<[^>]+>)*<\/a>/i);
  if (prevTextMatch) prevUrl = prevTextMatch[1];
  if (!prevUrl) {
    const prevClass = html.match(/<a[^>]+class\s*=\s*["'][^"']*prev[^"']*["'][^>]+href\s*=\s*["']([^"']+)["']/i);
    if (prevClass) prevUrl = prevClass[1];
  }
  
  if (nextUrl && !nextUrl.startsWith('http')) nextUrl = abs(nextUrl);
  if (prevUrl && !prevUrl.startsWith('http')) prevUrl = abs(prevUrl);
  if (nextUrl === currentUrl || nextUrl === '#' || nextUrl === 'javascript:void(0)') nextUrl = null;
  if (prevUrl === currentUrl || prevUrl === '#') prevUrl = null;
  
  return { nextUrl, prevUrl };
}

// 修改后：只保留下载线路，完全移除在线播放线路的解析
async function parseDetailLines(detailUrl) {
  try {
    var html = await reqText(detailUrl);
    var lines = [];
    
    // ========= 仅提取下载地址（原逻辑 保留下载线路） =========
    var downloadIdx = html.indexOf('【下载地址】');
    if (downloadIdx >= 0) {
      var downloadStart = downloadIdx;
      var downloadEnd = html.length;
      var nextH3 = html.indexOf('<h3', downloadIdx + 6);
      var nextWidget = html.indexOf('<div class="widget', downloadIdx + 6);
      if (nextH3 > 0 && nextH3 < downloadEnd) downloadEnd = nextH3;
      if (nextWidget > 0 && nextWidget < downloadEnd) downloadEnd = nextWidget;
      var downloadHtml = html.substring(downloadStart, downloadEnd);
      var downRegex = /<a\s+(?:[^>]*?\s+)?href\s*=\s*"([^"]+)"[^>]*>([^<]+)<\/a>/gi;
      var downEps = [];
      var seenUrls = {};
      var m;
      while ((m = downRegex.exec(downloadHtml))) {
        var downUrl = m[1];
        var downTitle = clean(m[2]);
        if (seenUrls[downUrl]) continue;
        if (downTitle.length < 2 && downUrl.indexOf('magnet:') !== 0) continue;
        if (downUrl.indexOf('#respond') >= 0 || downUrl.indexOf('category') >= 0) continue;
        seenUrls[downUrl] = true;
        if (downTitle === '链接' || downTitle.length < 2 || downUrl.indexOf(downTitle) >= 0) {
          if (downUrl.indexOf('quark') > 0) downTitle = '夸克网盘';
          else if (downUrl.indexOf('xunlei') > 0) downTitle = '迅雷网盘';
          else if (downUrl.indexOf('magnet:') === 0) downTitle = '磁力链接';
          else downTitle = '下载';
        }
        downEps.push({ href: downUrl, title: downTitle, isDownload: true });
      }
      if (downEps.length > 0) {
        lines.push({ sid: String(lines.length + 1), name: '📥 下载地址', eps: downEps });
      }
    }
    // 完全忽略任何在线播放线路（h3播放地址、flatRegex等不再解析）
    return lines;
  } catch(e) {
    console.error('解析详情失败:', e);
    return [];
  }
}

async function playEpisode(playUrl, title, isDownload) {
  if (isDownload) {
    statusEl.textContent = '打开：' + title;
    if (playUrl.indexOf('magnet:') === 0) {
      if (window.fm && fm.play) fm.play(playUrl, title, { referer: BASE });
      else window.open(playUrl, '_blank');
    } else if (playUrl.indexOf('quark.cn') > 0 || playUrl.indexOf('xunlei.com') > 0 || playUrl.indexOf('pan.baidu.com') > 0) {
      if (window.fm && fm.play) {
        fm.play('push://' + playUrl, title);
        statusEl.textContent = '已推送：' + title;
      } else {
        window.open(playUrl, '_blank');
      }
    } else {
      if (window.fm && fm.openUrl) fm.openUrl(playUrl);
      else window.open(playUrl, '_blank');
    }
    return;
  }
  // 由于只保留下载线路，理论上不会进入此分支，但保留原逻辑以防万一
  statusEl.textContent = '已忽略在线播放请求';
}

function parseList(html, keyword) {
  var items = [];
  var postRegex = /<li[^>]*class="[^"]*\bpost\b[^"]*"[^>]*>[\s\S]*?<div class="thumbnail">[\s\S]*?<a[\s\S]*?href\s*=\s*"([^"]+\.html)"[\s\S]*?<img[^>]*src="([^"]+)"[^>]*>[\s\S]*?<h2>[\s\S]*?<a[\s\S]*?href\s*=\s*"[^"]*"[^>]*>([^<]+)<\/a>/gi;
  var match;
  var seen = {};
  while ((match = postRegex.exec(html))) {
    var href = match[1];
    var img = match[2];
    var title = match[3].trim();
    if (href.indexOf('/e/') === 0) continue;
    if (href === '/' || href === '/index.html') continue;
    if (title.length < 2) continue;
    var fullUrl = href.startsWith('http') ? href : BASE + href;
    if (seen[fullUrl]) continue;
    seen[fullUrl] = true;
    var badge = '';
    var yearMatch = title.match(/\b(19|20)\d{2}\b/);
    if (yearMatch) badge = yearMatch[0];
    items.push({ href: fullUrl, title: clean(title), remark: badge, image: abs(img) });
  }
  if (items.length === 0) {
    var regex = /<a\s+(?:[^>]*?\s+)?href="([^"]+\.html)"[^>]*>([^<]+)<\/a>/gi;
    while ((match = regex.exec(html))) {
      var href2 = match[1];
      var title2 = match[2].trim();
      if (href2.indexOf('/e/') === 0) continue;
      if (href2 === '/' || href2 === '/index.html') continue;
      if (!href2.match(/\/[a-zA-Z0-9_-]+\/\d+\.html/) && !href2.match(/\/\d+\.html/)) continue;
      if (title2.length < 2) continue;
      var fullUrl2 = href2.startsWith('http') ? href2 : BASE + href2;
      if (seen[fullUrl2]) continue;
      seen[fullUrl2] = true;
      var badge2 = '';
      var yearMatch2 = title2.match(/\b(19|20)\d{2}\b/);
      if (yearMatch2) badge2 = yearMatch2[0];
      items.push({ href: fullUrl2, title: clean(title2), remark: badge2, image: '' });
    }
  }
  return items;
}

function renderSections(items, keyword, nextUrl, prevUrl) {
  if (!items.length) {
    content.innerHTML = '<div class="empty">暂无内容</div>';
    return;
  }
  var title = keyword ? '🔍 搜索：' + keyword : '📺 影片列表';
  var gridHtml = '\n    <section class="section">\n      <div class="section-title"><h2>' + esc(title) + '</h2></div>\n      <div class="grid">\n        ' + items.map(function(it) {
    return '\n          <article class="card focusable" tabindex="0" data-href="' + esc(it.href) + '">\n            <div class="poster">\n              ' + (it.image ? '<img loading="lazy" referrerpolicy="no-referrer" src="' + esc(imgUrl(it.image)) + '" alt="' + esc(it.title) + '">' : '<div class="noimg">6v</div>') + '\n            </div>\n            <div class="meta">\n              <div class="name">' + esc(it.title) + '</div>\n              <div class="remark">' + esc(it.remark || '点击查看详情') + '</div>\n            </div>\n          </article>\n        ';
  }).join('') + '\n      </div>\n    </section>\n  ';
  var paginationHtml = '';
  if (nextUrl || prevUrl) {
    paginationHtml = '<div class="pagination">' +
      '<button class="page-btn focusable ' + (!prevUrl ? 'disabled' : '') + '" data-page="prev">◀ 上一页</button>' +
      '<button class="page-btn focusable ' + (!nextUrl ? 'disabled' : '') + '" data-page="next">下一页 ▶</button>' +
      '</div>';
  }
  content.innerHTML = gridHtml + paginationHtml;
  Array.from(content.querySelectorAll('.card')).forEach(function(card) {
    card.onclick = function() { openDetail(card.dataset.href); };
  });
  if (nextUrl || prevUrl) {
    var prevBtn = content.querySelector('.page-btn[data-page="prev"]');
    var nextBtn = content.querySelector('.page-btn[data-page="next"]');
    if (prevBtn && !prevBtn.classList.contains('disabled')) prevBtn.onclick = function() { if (prevUrl) loadPage(prevUrl); };
    if (nextBtn && !nextBtn.classList.contains('disabled')) nextBtn.onclick = function() { if (nextUrl) loadPage(nextUrl); };
  }
  if (document.documentElement.classList.contains('tv-mode')) {
    setTimeout(function() {
      var firstCard = content.querySelector('.card');
      if (firstCard) firstCard.focus({ preventScroll: true });
    }, 100);
  }
}

async function loadPage(url) {
  url = abs(url);
  if (!url) return;
  currentUrl = url;
  
  if (!lastSearchKeyword) {
    Array.from(tabsDiv.querySelectorAll('.tab')).forEach(function(btn) {
      if (abs(btn.dataset.url) === currentUrl) btn.classList.add('active');
      else btn.classList.remove('active');
    });
  } else {
    Array.from(tabsDiv.querySelectorAll('.tab')).forEach(function(btn) {
      btn.classList.remove('active');
    });
  }
  
  content.innerHTML = '<div class="empty loading">正在加载内容…</div>';
  try {
    var html = await reqText(currentUrl);
    var items = parseList(html);
    
    let inferred = inferPaginationFromUrl(currentUrl);
    let parsed = parsePaginationFromHtml(html, currentUrl);
    let finalNext = inferred.next || parsed.nextUrl;
    let finalPrev = inferred.prev || parsed.prevUrl;
    
    renderSections(items, lastSearchKeyword || '', finalNext, finalPrev);
    statusEl.textContent = '已加载 ' + items.length + ' 条内容';
    restoreFocus();
  } catch(e) {
    content.innerHTML = '<div class="empty">加载失败：' + esc(e.message) + '</div>';
    statusEl.textContent = '错误：' + e.message;
  }
}

async function search(q) {
  q = clean(q);
  if (!q) return;
  lastSearchKeyword = q;
  history.pushState({ route: 'search', q: q }, '', '#search=' + encodeURIComponent(q));
  Array.from(tabsDiv.querySelectorAll('.tab')).forEach(function(btn) { btn.classList.remove('active'); });
  content.innerHTML = '<div class="empty loading">搜索中…</div>';
  var searchUrl = BASE + '/e/search/11index.php';
  var postData = 'keyboard=' + encodeURIComponent(q) + '&show=title&tempid=1&tbname=article&mid=1&dopost=search&submit=';
  var html;
  try {
    html = await reqText(searchUrl, { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: postData });
  } catch(e) {
    content.innerHTML = '<div class="empty">搜索失败，请检查网络</div>';
    statusEl.textContent = '搜索失败：' + q;
    return;
  }
  var items = parseList(html);
  let inferred = inferPaginationFromUrl(searchUrl);
  let parsed = parsePaginationFromHtml(html, searchUrl);
  let finalNext = inferred.next || parsed.nextUrl;
  let finalPrev = inferred.prev || parsed.prevUrl;
  currentUrl = searchUrl;
  if (!items.length) {
    content.innerHTML = '<div class="empty">没有找到相关结果</div>';
    statusEl.textContent = '无搜索结果：' + q;
    return;
  }
  renderSections(items, q, finalNext, finalPrev);
  statusEl.textContent = '搜索完成：' + q;
}

async function openDetail(detailUrl) {
  lastFocus = document.activeElement;
  document.body.classList.add('detail-active');
  $('#detailSheet').classList.add('active');
  $('#detailPanel').innerHTML = '<div class="empty loading">正在读取详情…</div>';
  history.pushState({ route: 'detail', url: detailUrl }, '', '#detail=' + encodeURIComponent(detailUrl));
  try {
    var html = await reqText(detailUrl);
    var titleMatch = html.match(/<title>([^<]+)-/);
    var title = titleMatch ? titleMatch[1].trim() : '未知影片';
    var imgMatch = html.match(/<img[^>]+src="([^"]+\.jpg)"/i);
    var image = imgMatch ? imgMatch[1] : '';
    var descMatch = html.match(/◎简　　介\s*([\s\S]*?)(?:◎|$)/);
    var desc = descMatch ? clean(descMatch[1]) : '暂无简介';
    var lines = await parseDetailLines(detailUrl);
    if (lines.length === 0) {
      $('#detailPanel').innerHTML = '<button class="focusable" id="closeDetail">返回</button><div class="empty">未找到下载链接</div>';
      $('#closeDetail').onclick = closeDetail;
      return;
    }
    var lineTabsHtml = lines.map(function(ln, idx) { return '<button class="line-tab focusable ' + (idx===0?'active':'') + '" data-sid="' + esc(ln.sid) + '">' + esc(ln.name) + '(' + ln.eps.length + ')</button>'; }).join('');
    var panelHtml = '\n      <button class="focusable" id="closeDetail">返回</button>\n      <div class="detail-head">\n        <img class="detail-pic" referrerpolicy="no-referrer" src="' + esc(image) + '" onerror="this.style.display=\'none\'">\n        <div>\n          <div class="detail-title">' + esc(title) + '</div>\n          <div class="detail-info">6v影视资源</div>\n          <p class="desc">' + esc(desc) + '</p>\n        </div>\n      </div>\n      <h3>下载线路</h3>\n      <div class="line-tabs">' + lineTabsHtml + '</div>\n      <div class="episodes" id="episodeBox"></div>\n    ';
    $('#detailPanel').innerHTML = panelHtml;
    $('#closeDetail').onclick = closeDetail;
    function renderLine(sid) {
      var line = lines.find(function(l) { return l.sid == sid; }) || lines[0];
      if (!line) return;
      var epHtml = line.eps.map(function(ep) { return '<button class="ep focusable" data-href="' + esc(ep.href) + '"' + (ep.isDownload ? ' data-download="true"' : '') + '>' + esc(ep.title) + '</button>'; }).join('');
      $('#episodeBox').innerHTML = epHtml || '<div class="empty">暂无下载项</div>';
      Array.from($('#episodeBox').querySelectorAll('.ep')).forEach(function(btn) {
        btn.onclick = function() { playEpisode(btn.dataset.href, title + ' ' + btn.textContent, btn.dataset.download === 'true'); };
      });
      var firstEp = $('#episodeBox').querySelector('.ep');
      if (firstEp) firstEp.focus({ preventScroll: true });
    }
    var lineTabs = $('#detailPanel').querySelectorAll('.line-tab');
    lineTabs.forEach(function(tab) {
      tab.onclick = function() {
        lineTabs.forEach(function(t) { t.classList.remove('active'); });
        tab.classList.add('active');
        renderLine(tab.dataset.sid);
      };
    });
    renderLine(lines[0].sid);
    setTimeout(function() {
      var fe = $('#episodeBox') && $('#episodeBox').querySelector('.ep');
      if (!fe) $('#closeDetail') && $('#closeDetail').focus();
    }, 80);
  } catch(e) {
    $('#detailPanel').innerHTML = '<button class="focusable" id="closeDetail">返回</button><div class="empty">详情加载失败：' + esc(e.message) + '</div>';
    $('#closeDetail').onclick = closeDetail;
  }
}

function closeDetail() {
  document.body.classList.remove('detail-active');
  $('#detailSheet').classList.remove('active');
  if (location.hash.startsWith('#detail')) history.back();
  if (lastFocus && lastFocus.focus) setTimeout(function() { lastFocus.focus({ preventScroll: true }); }, 50);
}
window.__fyClose = closeDetail;

function renderTabs() {
  tabsDiv.innerHTML = CATS.map(function(cat) {
    var name = cat[0], path = cat[1];
    var url = abs(path);
    var active = (url === currentUrl && !lastSearchKeyword) ? 'active' : '';
    return '<button class="tab focusable ' + active + '" data-url="' + esc(url) + '">' + esc(name) + '</button>';
  }).join('');
  Array.from(tabsDiv.querySelectorAll('.tab')).forEach(function(btn) {
    btn.onclick = function() { 
      lastSearchKeyword = '';
      loadPage(btn.dataset.url); 
    };
  });
}

function restoreFocus() {
  setTimeout(function() {
    var el = document.querySelector('.tab.active') || document.querySelector('.card');
    if (el) el.focus({ preventScroll: true });
  }, 50);
}

function handleKeys(e) {
  if (e.key === 'Escape' || e.key === 'Backspace') {
    if ($('#detailSheet').classList.contains('active')) {
      e.preventDefault();
      closeDetail();
      return;
    }
  }
  if (e.key === 'Enter' && document.activeElement && document.activeElement.classList.contains('focusable') && document.activeElement.tagName !== 'INPUT') {
    document.activeElement.click();
  }
}

function boot() {
  detectTV();
  statusEl.textContent = '正在初始化…';
  renderTabs();
  $('#searchForm').onsubmit = function(e) { e.preventDefault(); search($('#kw').value); };
  document.addEventListener('keydown', handleKeys, true);
  window.addEventListener('popstate', function() {
    if ($('#detailSheet').classList.contains('active')) closeDetail();
    else if (lastSearchKeyword) {
      search(lastSearchKeyword);
    } else {
      loadPage(currentUrl);
    }
  });
  loadPage(BASE + '/');
}

waitFm().then(function() { try { boot(); } catch(e) { statusEl.textContent = '启动失败：' + e.message; } }).catch(function() { boot(); });
})();
</script>
